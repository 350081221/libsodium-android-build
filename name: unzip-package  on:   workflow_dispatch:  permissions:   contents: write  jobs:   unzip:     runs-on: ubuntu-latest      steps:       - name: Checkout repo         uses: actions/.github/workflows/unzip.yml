name: unzip-package

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  unzip:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Unzip package
        run: |
          mkdir -p extracted
          unzip -o "元气多开_1.11.5.zip" -d extracted
          find extracted -maxdepth 5 -type f > extracted_file_list.txt

      - name: Commit extracted files
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add extracted extracted_file_list.txt
          git commit -m "Extract zip package" || echo "No changes to commit"
          git push
