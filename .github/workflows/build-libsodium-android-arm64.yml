name: Build libsodium for Android arm64

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout libsodium source
        uses: actions/checkout@v4
        with:
          repository: jedisct1/libsodium
          ref: stable

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y autoconf automake libtool pkg-config build-essential

      - name: Download Android NDK
        run: |
          wget https://dl.google.com/android/repository/android-ndk-r26d-linux.zip
          unzip -q android-ndk-r26d-linux.zip
          echo "ANDROID_NDK_HOME=$PWD/android-ndk-r26d" >> $GITHUB_ENV
          echo "$PWD/android-ndk-r26d/toolchains/llvm/prebuilt/linux-x86_64/bin" >> $GITHUB_PATH

      - name: Build libsodium for arm64-v8a
        run: |
          ./autogen.sh

          export API=21
          export TARGET=aarch64-linux-android

          export CC=${TARGET}${API}-clang
          export CXX=${TARGET}${API}-clang++
          export AR=llvm-ar
          export AS=llvm-as
          export LD=ld.lld
          export RANLIB=llvm-ranlib
          export STRIP=llvm-strip

          mkdir -p build-android-arm64
          cd build-android-arm64

          ../configure \
            --host=aarch64-linux-android \
            --prefix=$PWD/../out/android-arm64 \
            --enable-static \
            --disable-shared

          make -j$(nproc)
          make install

      - name: Package output
        run: |
          cd out
          tar -czvf libsodium-android-arm64.tar.gz android-arm64

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: libsodium-android-arm64
          path: out/libsodium-android-arm64.tar.gz
