name: decompile-apk

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  decompile:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y unzip wget apktool
          wget -q https://github.com/skylot/jadx/releases/download/v1.5.0/jadx-1.5.0.zip -O jadx.zip
          unzip -q jadx.zip -d jadx_tool
          chmod +x jadx_tool/bin/jadx

      - name: Clean old output
        run: |
          rm -rf jadx_out apktool_out decompile_file_list.txt

      - name: Run JADX
        run: |
          mkdir -p jadx_out
          ./jadx_tool/bin/jadx -d jadx_out "extracted/元气多开_1.11.5.apk" || true

      - name: Run apktool
        run: |
          apktool d -f "extracted/元气多开_1.11.5.apk" -o apktool_out || true

      - name: Make file list
        run: |
          echo "==== JADX ====" > decompile_file_list.txt
          find jadx_out -maxdepth 8 -type f | head -3000 >> decompile_file_list.txt || true
          echo "" >> decompile_file_list.txt
          echo "==== APKTOOL ====" >> decompile_file_list.txt
          find apktool_out -maxdepth 8 -type f | head -3000 >> decompile_file_list.txt || true

      - name: Commit decompiled files
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add jadx_out apktool_out decompile_file_list.txt
          git commit -m "Decompile APK with JADX and apktool" || echo "No changes to commit"
          git push
